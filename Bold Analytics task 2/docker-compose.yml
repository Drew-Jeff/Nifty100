version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nifty100_db
    restart: always
    environment:
      POSTGRES_USER: nifty_admin
      POSTGRES_PASSWORD: Nifty100Db
      POSTGRES_DB: nifty100
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: